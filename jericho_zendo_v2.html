<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jericho Zendo - Gestión de Alumnos</title>
    <style>
        /* Estilos Base actualizados para las nuevas funciones */
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
        .app-shell{display:flex;min-height:100vh}
        .sidebar{width:220px;background:#fff;border-right:1px solid #e8e6e0;padding:1.5rem 1rem;display:flex;flex-direction:column;gap:4px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
        .main{flex:1;padding:2rem;max-width:1000px}
        .nav-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;font-size:14px;color:#5f5e5a;border:none;background:transparent;width:100%;text-align:left;transition:0.2s}
        .nav-item.active{background:#f0ede8;color:#1a1a1a;font-weight:600}
        .screen{display:none}.screen.active{display:block}
        .card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}

        /* Estados e Indicadores */
        .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}
        .status-active{background:#1D9E75} /* Verde */
        .status-inactive{background:#E24B4A} /* Rojo */
        
        /* Tier y Puntaje */
        .tier-badge{padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700;border:1.5px solid}
        .score-tag{font-weight:700;color:#1a1a1a;font-size:14px;background:#f0ede8;padding:2px 8px;border-radius:4px}

        /* Comparador */
        .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        .compare-col{display:flex;flex-direction:column;gap:15px}
        .stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0ede8}

        /* Grid de alumnos */
        .athlete-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
        .athlete-card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:1.25rem;cursor:pointer;transition: transform 0.2s}
        .athlete-card:hover{border-color:#b4b2a9; transform: translateY(-2px)}

        /* Formularios */
        .form-row{display:flex;gap:12px;margin-bottom:14px}
        .field{display:flex;flex-direction:column;gap:5px;flex:1}
        .field label{font-size:12px;color:#888780}
        input, select{padding:8px;border:1px solid #e8e6e0;border-radius:8px; width: 100%}
        .btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
        .btn-dark{background:#1a1a1a;color:#fff}
        
        /* Gráfico de barras simple */
        .bar-container{height:8px; background:#f0ede8; border-radius:4px; overflow:hidden; margin-top:8px}
        .bar-fill{height:100%; background:#1a1a1a}
    </style>
</head>
<body>

<div class="app-shell">
    <nav class="sidebar">
        <div style="font-weight:bold; margin-bottom: 2rem; padding: 0 10px; font-size: 1.2rem">JERICHO ZENDO</div>
        <button class="nav-item active" onclick="nav('dashboard')">Panel General</button>
        <button class="nav-item" onclick="nav('athletes')">Alumnos</button>
        <button class="nav-item" onclick="nav('compare')">Comparar</button>
        <button class="nav-item" onclick="nav('add')">Nuevo Alumno</button>
    </nav>

    <main class="main">
        <!-- Dashboard -->
        <div id="screen-dashboard" class="screen active">
            <h2 style="margin-bottom:1.5rem">Panel General</h2>
            <div id="dash-summary" style="display:flex; gap:20px">
                <!-- Se llena con JS -->
            </div>
        </div>

        <!-- Alumnos -->
        <div id="screen-athletes" class="screen">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem">
                <div>
                    <h2>Alumnos</h2>
                    <span id="count-summary" style="font-size:14px; color:#888780"></span>
                </div>
                <div style="display:flex; gap:10px">
                    <select id="sortOption" onchange="renderAthletes()" style="width: auto">
                        <option value="name">Nombre</option>
                        <option value="tier_desc">Tier (Mayor a Menor)</option>
                        <option value="tier_asc">Tier (Menor a Mayor)</option>
                        <option value="score">Mejor Puntaje</option>
                    </select>
                </div>
            </div>
            <div class="athlete-grid" id="athleteGrid"></div>
        </div>

        <!-- Comparar -->
        <div id="screen-compare" class="screen">
            <h2 style="margin-bottom:1.5rem">Comparar Alumnos</h2>
            <div class="card" style="display:flex; gap:15px; align-items: center; margin-bottom:1.5rem">
                <div class="field">
                    <label>Alumno 1</label>
                    <select id="compare1" onchange="updateComparison()"></select>
                </div>
                <div style="font-weight: bold; padding-top: 15px">VS</div>
                <div class="field">
                    <label>Alumno 2</label>
                    <select id="compare2" onchange="updateComparison()"></select>
                </div>
            </div>
            <div id="compareResult" class="compare-grid">
                <!-- Se llena dinámicamente -->
            </div>
        </div>

        <!-- Agregar Alumno -->
        <div id="screen-add" class="screen">
            <h2 style="margin-bottom:1.5rem">Nuevo Alumno</h2>
            <div class="card" style="max-width: 500px">
                <div class="form-row">
                    <div class="field"><label>Nombre</label><input type="text" id="newName" placeholder="Ej: Juan Pérez"></div>
                </div>
                <div class="form-row">
                    <div class="field">
                        <label>Estado</label>
                        <select id="newState">
                            <option value="active">Activo</option>
                            <option value="inactive">Inactivo</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Tier</label>
                        <select id="newTier">
                            <option value="S">S</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="field">
                        <label>Plan</label>
                        <select id="newPlan">
                            <option value="Básico">Básico</option>
                            <option value="Intermedio" selected>Intermedio</option>
                            <option value="Avanzado">Avanzado</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Vencimiento (Día)</label>
                        <input type="number" id="newDueDay" value="10" min="1" max="31">
                    </div>
                </div>
                <button class="btn btn-dark" onclick="addAthlete()" style="width: 100%; margin-top: 10px">Guardar Alumno</button>
            </div>
        </div>
    </main>
</div>

<script>
// Configuración de Tiers jerárquicos S > A > B > C > D
const TIER_RANK = { 'S': 5, 'A': 4, 'B': 3, 'C': 2, 'D': 1 };
const TIER_STYLE = {
    'S': {bg:'#EEEDFE', color:'#3C3489', border:'#7F77DD'},
    'A': {bg:'#E1F5EE', color:'#085041', border:'#1D9E75'},
    'B': {bg:'#E6F1FB', color:'#0C447C', border:'#378ADD'},
    'C': {bg:'#FAEEDA', color:'#633806', border:'#EF9F27'},
    'D': {bg:'#FCEBEB', color:'#791F1F', border:'#E24B4A'}
};

// Datos Iniciales / Almacenamiento
let athletes = JSON.parse(localStorage.getItem('jericho_zendo_db')) || [
    { id: 1, name: 'Lucas Pérez', tier: 'A', status: 'active', plan: 'Intermedio', dueDay: 25, stats: [8, 7, 9, 6, 8, 7], rounds: 45, achievements: 12 },
    { id: 2, name: 'Marcos Ruiz', tier: 'S', status: 'active', plan: 'Avanzado', dueDay: 10, stats: [9, 9, 8, 10, 9, 9], rounds: 120, achievements: 25 },
    { id: 3, name: 'Ana Sosa', tier: 'C', status: 'inactive', plan: 'Básico', dueDay: 5, stats: [5, 4, 6, 5, 4, 5], rounds: 15, achievements: 2 }
];

function save() {
    localStorage.setItem('jericho_zendo_db', JSON.stringify(athletes));
}

// Lógica de Puntaje (Promedio de 6 estadísticas)
function calculateScore(stats) {
    if(!stats || stats.length === 0) return 0;
    const sum = stats.reduce((a, b) => a + b, 0);
    return (sum / 6).toFixed(1);
}

// Navegación entre pantallas
function nav(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('screen-' + screen).classList.add('active');
    
    // Marcar item de navegación como activo
    const items = document.querySelectorAll('.nav-item');
    if(screen === 'dashboard') items[0].classList.add('active');
    if(screen === 'athletes') { items[1].classList.add('active'); renderAthletes(); }
    if(screen === 'compare') { items[2].classList.add('active'); populateCompareSelects(); }
    if(screen === 'add') items[3].classList.add('active');
    
    if(screen === 'dashboard') renderDash();
}

// Renderizar Panel General
function renderDash() {
    const activeCount = athletes.filter(a => a.status === 'active').length;
    const container = document.getElementById('dash-summary');
    container.innerHTML = `
        <div class="card" style="flex:1; text-align:center">
            <div style="font-size:32px; font-weight:bold; color:#1D9E75">${activeCount}</div>
            <div style="font-size:14px; color:#888780">Alumnos Activos</div>
        </div>
        <div class="card" style="flex:1; text-align:center">
            <div style="font-size:32px; font-weight:bold">${athletes.length}</div>
            <div style="font-size:14px; color:#888780">Total Alumnos</div>
        </div>
    `;
}

// Renderizar Lista de Alumnos con Ordenamiento
function renderAthletes() {
    const grid = document.getElementById('athleteGrid');
    const sort = document.getElementById('sortOption').value;
    
    let list = [...athletes];
    
    // Aplicar ordenamiento
    if(sort === 'tier_desc') list.sort((a,b) => TIER_RANK[b.tier] - TIER_RANK[a.tier]);
    else if(sort === 'tier_asc') list.sort((a,b) => TIER_RANK[a.tier] - TIER_RANK[b.tier]);
    else if(sort === 'score') list.sort((a,b) => calculateScore(b.stats) - calculateScore(a.stats));
    else if(sort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));

    grid.innerHTML = '';
    list.forEach(a => {
        const score = calculateScore(a.stats);
        const style = TIER_STYLE[a.tier];
        const statusColor = a.status === 'active' ? '#1D9E75' : '#E24B4A';
        
        // Lógica de colores de cuota (Simulada según el día del mes actual)
        const currentDay = new Date().getDate();
        let dateColor = '#1D9E75'; // Verde por defecto
        if (a.dueDay < currentDay) dateColor = '#E24B4A'; // Vencido
        else if (a.dueDay - currentDay <= 3) dateColor = '#EF9F27'; // Pronto a vencer

        grid.innerHTML += `
            <div class="athlete-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:12px">
                    <div style="display:flex; align-items:center">
                        <span class="status-dot" style="background:${statusColor}"></span>
                        <span style="font-size: 11px; font-weight: 600; color: ${statusColor}">${a.status === 'active' ? 'ACTIVO' : 'INACTIVO'}</span>
                    </div>
                    <span class="tier-badge" style="background:${style.bg}; color:${style.color}; border-color:${style.border}">
                        Tier ${a.tier} | ${score}
                    </span>
                </div>
                <div style="font-weight:bold; font-size:18px; margin-bottom: 8px">${a.name}</div>
                <div style="padding: 8px 0; border-top: 1px solid #f0ede8; margin-top: 10px">
                    <div style="font-size:12px; color:#5f5e5a">Plan: <strong>${a.plan}</strong></div>
                    <div style="font-size:12px; color:${dateColor}; margin-top: 4px">Vence el día: <strong>${a.dueDay}</strong></div>
                </div>
            </div>
        `;
    });

    document.getElementById('count-summary').innerText = `${athletes.length} alumnos (${athletes.filter(a=>a.status==='active').length} activos)`;
}

// Lógica de Comparación
function populateCompareSelects() {
    const s1 = document.getElementById('compare1');
    const s2 = document.getElementById('compare2');
    const options = athletes.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    s1.innerHTML = options;
    s2.innerHTML = options;
    if(athletes.length > 1) s2.selectedIndex = 1;
    updateComparison();
}

function updateComparison() {
    const id1 = document.getElementById('compare1').value;
    const id2 = document.getElementById('compare2').value;
    const a1 = athletes.find(a => a.id == id1);
    const a2 = athletes.find(a => a.id == id2);
    const res = document.getElementById('compareResult');

    const renderCol = (a) => {
        const score = calculateScore(a.stats);
        return `
            <div class="compare-col card">
                <div style="text-align:center; border-bottom: 1px solid #f0ede8; padding-bottom: 15px">
                    <h3 style="margin-bottom: 10px">${a.name}</h3>
                    <span class="tier-badge" style="background:${TIER_STYLE[a.tier].bg}; border-color:${TIER_STYLE[a.tier].border}">Tier ${a.tier}</span>
                    <span class="score-tag" style="margin-left: 5px">${score} Puntos</span>
                </div>
                <div class="stat-row"><span>Disciplina</span><strong>${a.plan}</strong></div>
                <div class="stat-row"><span>Rounds</span><strong>${a.rounds}</strong></div>
                <div class="stat-row"><span>Logros</span><strong>${a.achievements}</strong></div>
                
                <div style="margin-top: 15px">
                    <div style="display:flex; justify-content: space-between; font-size: 11px; color: #888780; margin-bottom: 4px">
                        <span>POTENCIAL</span>
                        <span>${score * 10}%</span>
                    </div>
                    <div class="bar-container">
                        <div class="bar-fill" style="width:${score*10}%"></div>
                    </div>
                </div>
            </div>
        `;
    };

    if(!a1 || !a2) {
        res.innerHTML = "<p>Selecciona dos alumnos para comparar.</p>";
        return;
    }
    res.innerHTML = renderCol(a1) + renderCol(a2);
}

// Agregar Alumno
function addAthlete() {
    const name = document.getElementById('newName').value;
    if(!name) return alert("Por favor ingresa un nombre.");
    
    const newObj = {
        id: Date.now(),
        name: name,
        status: document.getElementById('newState').value,
        tier: document.getElementById('newTier').value,
        plan: document.getElementById('newPlan').value,
        dueDay: parseInt(document.getElementById('newDueDay').value) || 10,
        stats: [5, 5, 5, 5, 5, 5], // Stats base
        rounds: 0,
        achievements: 0
    };
    
    athletes.push(newObj);
    save();
    document.getElementById('newName').value = "";
    alert("Alumno agregado correctamente.");
    nav('athletes');
}

// Carga Inicial
window.onload = () => {
    renderDash();
};
</script>
</body>
</html>

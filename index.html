<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Gimnasio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
a,button,input,select,textarea{font-family:inherit}

/* Layout */
.app-shell{display:flex;min-height:100vh}
.sidebar{width:220px;background:#fff;border-right:1px solid #e8e6e0;padding:1.5rem 1rem;display:flex;flex-direction:column;gap:4px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;padding:2rem;max-width:900px}
.logo{font-size:17px;font-weight:600;color:#1a1a1a;padding:0 8px;margin-bottom:1.5rem;display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;border-radius:8px;background:#1a1a1a;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:14px;color:#5f5e5a;border:none;background:transparent;width:100%;text-align:left;transition:background 0.1s}
.nav-item:hover{background:#f5f4f0;color:#1a1a1a}
.nav-item.active{background:#f0ede8;color:#1a1a1a;font-weight:500}
.nav-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.nav-section{font-size:11px;color:#b4b2a9;font-weight:500;padding:12px 10px 4px;letter-spacing:0.05em;text-transform:uppercase}

/* Screens */
.screen{display:none}.screen.active{display:block}

/* Cards */
.card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-sm{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:1rem;margin-bottom:0.75rem}

/* Metrics */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:1rem;text-align:center}
.metric-val{font-size:26px;font-weight:600;color:#1a1a1a}
.metric-lbl{font-size:11px;color:#888780;margin-top:3px}

/* Athlete grid */
.athlete-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.athlete-card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:1.25rem;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s}
.athlete-card:hover{border-color:#b4b2a9;box-shadow:0 2px 8px rgba(0,0,0,0.06)}

/* Avatar */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.avatar-sm{width:38px;height:38px;font-size:13px}
.avatar-md{width:48px;height:48px;font-size:16px}
.avatar-lg{width:64px;height:64px;font-size:22px}

/* Tier badge */
.tier-badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700;border:1.5px solid}

/* Form */
.form-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:130px}
.field label{font-size:12px;color:#888780;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid #e8e6e0;border-radius:8px;font-size:14px;color:#1a1a1a;background:#fff;outline:none;transition:border-color 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#888780}
.field textarea{height:72px;resize:vertical}

/* Buttons */
.btn{padding:8px 18px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid;font-weight:500;transition:background 0.1s}
.btn-dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-dark:hover{background:#333}
.btn-ghost{background:transparent;color:#5f5e5a;border-color:#e8e6e0}
.btn-ghost:hover{background:#f5f4f0}

/* Tier selector */
.tier-select{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.tier-opt{padding:5px 10px;border:1px solid #e8e6e0;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:#888780;transition:all 0.1s}
.tier-opt:hover{border-color:#b4b2a9;color:#1a1a1a}
.tier-opt.sel{border-width:2px}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;flex-wrap:wrap;border-bottom:1px solid #e8e6e0;padding-bottom:0}
.tab{padding:8px 14px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#888780;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.1s}
.tab:hover{color:#1a1a1a}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.tab-content{display:none}.tab-content.active{display:block}

/* Log items */
.log-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0ede8}
.log-item:last-child{border-bottom:none}
.log-date{font-size:12px;color:#b4b2a9;white-space:nowrap;margin-left:12px}
.log-main{font-size:14px;color:#1a1a1a;font-weight:500}
.log-sub{font-size:12px;color:#888780;margin-top:2px}

/* Record rows */
.rec-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0ede8;font-size:13px}
.rec-row:last-child{border-bottom:none}

/* Badges */
.badge{display:inline-block;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600}
.badge-green{background:#e1f5ee;color:#085041}
.badge-purple{background:#eeedfe;color:#3c3489}
.badge-amber{background:#faeeda;color:#633806}
.badge-red{background:#fcebeb;color:#791f1f}
.badge-gray{background:#f1efe8;color:#444441}

/* Birthday banner */
.bday-banner{border-radius:10px;padding:12px 16px;margin-bottom:1rem;display:flex;align-items:center;gap:12px}
.bday-today{background:#faeeda;border:1px solid #fac775}
.bday-soon{background:#f1efe8;border:1px solid #d3d1c7}

/* Rounds bar */
.rounds-bar{background:#f0ede8;border-radius:4px;height:6px;overflow:hidden;margin-top:5px}
.rounds-fill{height:100%;border-radius:4px;background:#534AB7}

/* Attendance grid */
.att-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px}
.att-dot{width:100%;aspect-ratio:1;border-radius:4px;background:#f0ede8}
.att-dot.present{background:#1D9E75}.att-dot.absent{background:#F09595}

/* Profile header */
.profile-header{display:flex;align-items:flex-start;gap:18px;margin-bottom:1.5rem;flex-wrap:wrap}

/* Alerts */
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:1rem}
.alert-ok{background:#e1f5ee;border:1px solid #9fe1cb;color:#085041}
.alert-err{background:#fcebeb;border:1px solid #f7c1c1;color:#791f1f}

/* Section title */
.section-title{font-size:20px;font-weight:600;color:#1a1a1a;margin-bottom:1.25rem}
.section-sub{font-size:14px;color:#888780;margin-bottom:1.25rem;margin-top:-0.75rem}

/* Back btn */
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:#888780;cursor:pointer;margin-bottom:1.25rem;background:none;border:none;padding:0}
.back-btn:hover{color:#1a1a1a}

/* Empty */
.empty{text-align:center;padding:3rem 1rem;color:#b4b2a9;font-size:14px}

/* Mobile */
.menu-toggle{display:none;background:none;border:none;cursor:pointer;padding:8px}
.mobile-header{display:none;background:#fff;border-bottom:1px solid #e8e6e0;padding:12px 1rem;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}

@media(max-width:680px){
  .sidebar{display:none;position:fixed;top:0;left:0;height:100vh;z-index:200;width:240px}
  .sidebar.open{display:flex}
  .mobile-header{display:flex}
  .main{padding:1rem}
  .metric-val{font-size:20px}
  .app-shell{flex-direction:column}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:150}
  .overlay.open{display:block}
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="mobile-header">
  <button class="menu-toggle" onclick="toggleSidebar()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <span style="font-size:16px;font-weight:600">Mi Gimnasio</span>
  <div style="width:38px"></div>
</div>

<div class="app-shell">
<nav class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M2 8h4M18 8h4M2 16h4M18 16h4"/></svg>
    </div>
    Mi Gimnasio
  </div>
  <button class="nav-item active" onclick="nav('dashboard',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Panel
  </button>
  <button class="nav-item" onclick="nav('athletes',this)">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Alumnos
  </button>
  <div class="nav-section">Registrar</div>
  <button class="nav-item" onclick="nav('addAthlete',this)">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
    Nuevo alumno
  </button>
  <button class="nav-item" onclick="nav('logActivity',this)">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    Nuevo registro
  </button>
</nav>

<main class="main">
  <div id="bdayAlert"></div>

  <!-- DASHBOARD -->
  <div id="screen-dashboard" class="screen active">
    <div class="section-title">Panel general</div>
    <div class="metric-grid" id="globalMetrics"></div>
    <div class="card">
      <div style="font-size:15px;font-weight:600;margin-bottom:1rem">Actividad reciente</div>
      <div id="recentActivity"></div>
    </div>
  </div>

  <!-- ATHLETES -->
  <div id="screen-athletes" class="screen">
    <div class="section-title">Alumnos</div>
    <div class="athlete-grid" id="athleteGrid"></div>
  </div>

  <!-- ADD ATHLETE -->
  <div id="screen-addAthlete" class="screen">
    <div class="section-title">Nuevo alumno</div>
    <div class="card">
      <div class="form-row">
        <div class="field"><label>Nombre completo</label><input id="newName" type="text" placeholder="Ej: Lucas Pérez"></div>
        <div class="field"><label>Fecha de nacimiento</label><input id="newBday" type="date"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Peso (kg)</label><input id="newWeight" type="number" placeholder="70"></div>
        <div class="field"><label>Altura (cm)</label><input id="newHeight" type="number" placeholder="175"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Disciplina</label><input id="newCategory" type="text" placeholder="Ej: Boxeo, MMA, Muay Thai"></div>
        <div class="field"><label>Fecha de inicio</label><input id="newStartDate" type="date"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Rango</label>
          <div class="tier-select" id="newTierSelect"></div>
        </div>
      </div>
      <div class="form-row">
        <div class="field"><label>Notas</label><textarea id="newNotes" placeholder="Lesiones, objetivos, observaciones..."></textarea></div>
      </div>
      <div id="addAthleteMsg"></div>
      <button class="btn btn-dark" onclick="addAthlete()">Guardar alumno</button>
    </div>
  </div>

  <!-- LOG ACTIVITY -->
  <div id="screen-logActivity" class="screen">
    <div class="section-title">Nuevo registro</div>
    <div class="card">
      <div class="form-row">
        <div class="field"><label>Alumno</label><select id="logAthlete"><option value="">Seleccionar...</option></select></div>
        <div class="field"><label>Fecha</label><input id="logDate" type="date"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Tipo de registro</label>
          <select id="logType" onchange="toggleLogFields()">
            <option value="attendance">Asistencia</option>
            <option value="sparring">Sparring</option>
            <option value="achievement">Logro</option>
            <option value="record">Récord de ejercicio</option>
          </select>
        </div>
      </div>
      <div id="logFieldAttendance">
        <div class="form-row"><div class="field"><label>Estado</label><select id="logAttStatus"><option value="present">Presente</option><option value="absent">Ausente</option></select></div></div>
      </div>
      <div id="logFieldSparring" style="display:none">
        <div class="form-row">
          <div class="field"><label>Rounds</label><input id="logRounds" type="number" placeholder="3" min="1"></div>
          <div class="field"><label>Rival (opcional)</label><input id="logRival" type="text" placeholder="Nombre"></div>
        </div>
        <div class="form-row"><div class="field"><label>Notas</label><input id="logSparNotes" type="text" placeholder="Ej: Buen trabajo en clinch"></div></div>
      </div>
      <div id="logFieldAchievement" style="display:none">
        <div class="form-row"><div class="field"><label>Descripción del logro</label><input id="logAchDesc" type="text" placeholder="Ej: Primer KO, ganó torneo..."></div></div>
      </div>
      <div id="logFieldRecord" style="display:none">
        <div class="form-row">
          <div class="field"><label>Ejercicio</label><input id="logRecType" type="text" placeholder="Ej: Sentadilla, Peso muerto..."></div>
          <div class="field"><label>Marca</label><input id="logRecVal" type="text" placeholder="Ej: 120 kg, 15 reps..."></div>
        </div>
      </div>
      <div id="logMsg"></div>
      <button class="btn btn-dark" onclick="saveLog()">Guardar registro</button>
    </div>
  </div>

  <!-- PROFILE -->
  <div id="screen-profile" class="screen">
    <button class="back-btn" onclick="nav('athletes',null)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Volver a alumnos
    </button>
    <div class="profile-header">
      <div class="avatar avatar-lg" id="profileAvatar"></div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px">
          <span style="font-size:22px;font-weight:700" id="profileName"></span>
          <span id="profileTierBadge"></span>
          <span id="profileBdayBadge"></span>
        </div>
        <div style="font-size:13px;color:#888780;margin-bottom:12px" id="profileMeta"></div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:12px;color:#888780">Rango:</span>
          <div id="profileTierSelect" class="tier-select"></div>
        </div>
      </div>
    </div>
    <div class="metric-grid" id="profileMetrics"></div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab(event,'info')">Datos</button>
      <button class="tab" onclick="switchTab(event,'sparring')">Sparrings</button>
      <button class="tab" onclick="switchTab(event,'attendance')">Asistencia</button>
      <button class="tab" onclick="switchTab(event,'achievements')">Logros</button>
      <button class="tab" onclick="switchTab(event,'records')">Récords</button>
    </div>
    <div id="tab-info" class="tab-content active"></div>
    <div id="tab-sparring" class="tab-content"></div>
    <div id="tab-attendance" class="tab-content"></div>
    <div id="tab-achievements" class="tab-content"></div>
    <div id="tab-records" class="tab-content"></div>
  </div>
</main>
</div>

<script>
const TIERS=[
  {label:'A+',bg:'#EEEDFE',color:'#3C3489',border:'#7F77DD'},
  {label:'A', bg:'#E1F5EE',color:'#085041',border:'#1D9E75'},
  {label:'A-',bg:'#EAF3DE',color:'#27500A',border:'#639922'},
  {label:'B+',bg:'#E6F1FB',color:'#0C447C',border:'#378ADD'},
  {label:'B', bg:'#f1efe8',color:'#444441',border:'#888780'},
  {label:'B-',bg:'#F1EFE8',color:'#5f5e5a',border:'#B4B2A9'},
  {label:'C+',bg:'#FAEEDA',color:'#633806',border:'#EF9F27'},
  {label:'C', bg:'#FAECE7',color:'#712B13',border:'#D85A30'},
  {label:'C-',bg:'#FCEBEB',color:'#791F1F',border:'#E24B4A'},
];
const AVCOLS=[
  {bg:'#EEEDFE',c:'#3C3489'},{bg:'#E1F5EE',c:'#085041'},
  {bg:'#FAECE7',c:'#712B13'},{bg:'#E6F1FB',c:'#0C447C'},
  {bg:'#FAEEDA',c:'#633806'},{bg:'#FBEAF0',c:'#72243E'}
];

function gs(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

let athletes=gs('mg_athletes',[
  {id:1,name:'Matías González',bday:'2000-04-09',weight:72,height:178,category:'Boxeo',startDate:'2024-03-10',notes:'Zurdo. Objetivo: amateur 2025.',colorIdx:0,tier:'A'},
  {id:2,name:'Sofía Ramírez',bday:'1997-07-14',weight:58,height:165,category:'Muay Thai',startDate:'2024-06-01',notes:'Lesión rodilla resuelta.',colorIdx:1,tier:'B+'},
  {id:3,name:'Diego Torres',bday:'2004-12-25',weight:80,height:182,category:'MMA',startDate:'2025-01-15',notes:'',colorIdx:2,tier:'B'},
]);
let logs=gs('mg_logs',[
  {id:1,athleteId:1,date:'2025-04-07',type:'sparring',rounds:4,rival:'Bruno',notes:'Buen trabajo en distancia'},
  {id:2,athleteId:1,date:'2025-04-05',type:'attendance',status:'present'},
  {id:3,athleteId:2,date:'2025-04-07',type:'attendance',status:'present'},
  {id:4,athleteId:1,date:'2025-04-03',type:'achievement',desc:'Primer KO en sparring'},
  {id:5,athleteId:3,date:'2025-04-06',type:'record',recType:'Sentadilla',recVal:'100 kg'},
  {id:6,athleteId:2,date:'2025-04-04',type:'sparring',rounds:3,rival:'',notes:'Buen teep'},
  {id:7,athleteId:1,date:'2025-04-08',type:'attendance',status:'present'},
  {id:8,athleteId:2,date:'2025-04-08',type:'attendance',status:'present'},
  {id:9,athleteId:3,date:'2025-04-08',type:'attendance',status:'absent'},
  {id:10,athleteId:1,date:'2025-04-01',type:'sparring',rounds:5,rival:'Nico',notes:'Buen jab'},
  {id:11,athleteId:1,date:'2025-03-28',type:'record',recType:'Press banca',recVal:'85 kg'},
  {id:12,athleteId:2,date:'2025-04-02',type:'record',recType:'Peso muerto',recVal:'110 kg'},
]);
let nAid=gs('mg_naid',4),nLid=gs('mg_nlid',13),curProfile=null,selNewTier='B';

function save(){ss('mg_athletes',athletes);ss('mg_logs',logs);ss('mg_naid',nAid);ss('mg_nlid',nLid);}
function ini(n){return n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}
function ac(i){return AVCOLS[i%AVCOLS.length];}
function ti(t){return TIERS.find(x=>x.label===t)||TIERS[4];}
function fd(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`;}

function bdayToday(b){if(!b)return false;const t=new Date();const[,m,d]=b.split('-');return+m===t.getMonth()+1&&+d===t.getDate();}
function bdaySoon(b,days=7){if(!b)return false;const today=new Date();today.setHours(0,0,0,0);const[,m,d]=b.split('-');for(let i=1;i<=days;i++){const t=new Date(today);t.setDate(t.getDate()+i);if(+m===t.getMonth()+1&&+d===t.getDate())return i;}return false;}
function getAge(b){if(!b)return null;const[y,m,d]=b.split('-').map(Number);const t=new Date();let a=t.getFullYear()-y;if(t.getMonth()+1<m||(t.getMonth()+1===m&&t.getDate()<d))a--;return a;}

function tierHTML(current,cbName){
  return TIERS.map(t=>`<button class="tier-opt${t.label===current?' sel':''}" style="${t.label===current?`background:${t.bg};color:${t.color};border-color:${t.border};border-width:2px`:''}" onclick="${cbName}('${t.label}')">${t.label}</button>`).join('');
}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('open');}

function nav(name,btn){
  closeSidebar();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  else{const map={dashboard:0,athletes:1,addAthlete:2,logActivity:3};if(map[name]!==undefined)document.querySelectorAll('.nav-item')[map[name]].classList.add('active');}
  if(name==='dashboard')renderDash();
  if(name==='athletes')renderAthletes();
  if(name==='addAthlete'){selNewTier='B';document.getElementById('newTierSelect').innerHTML=tierHTML('B','selNewTierFn');}
  if(name==='logActivity')populateSel();
  if(name==='profile')renderProfile();
}

function selNewTierFn(t){selNewTier=t;document.getElementById('newTierSelect').innerHTML=tierHTML(t,'selNewTierFn');}
function setProfileTier(t){const a=athletes.find(x=>x.id===curProfile);if(!a)return;a.tier=t;save();const info=ti(t);document.getElementById('profileTierBadge').innerHTML=`<span class="tier-badge" style="background:${info.bg};color:${info.color};border-color:${info.border}">${t}</span>`;document.getElementById('profileTierSelect').innerHTML=tierHTML(t,'setProfileTier');}

function checkBdays(){
  const t=athletes.filter(a=>bdayToday(a.bday));
  const s=athletes.filter(a=>!bdayToday(a.bday)&&bdaySoon(a.bday));
  let h='';
  t.forEach(a=>{h+=`<div class="bday-banner bday-today"><div style="width:36px;height:36px;border-radius:50%;background:#fac775;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#633806" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div><div style="font-size:14px;font-weight:600;color:#412402">Hoy es el cumple de ${a.name}!</div><div style="font-size:12px;color:#633806;margin-top:2px">Cumple ${(getAge(a.bday)||0)+1} años hoy</div></div></div>`;});
  s.forEach(a=>{const days=bdaySoon(a.bday);h+=`<div class="bday-banner bday-soon"><div style="width:36px;height:36px;border-radius:50%;background:#d3d1c7;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#444441" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div><div style="font-size:14px;font-weight:600;color:#2c2c2a">Cumple de ${a.name} en ${days} ${days===1?'día':'días'}</div><div style="font-size:12px;color:#5f5e5a;margin-top:2px">Va a cumplir ${(getAge(a.bday)||0)+1} años</div></div></div>`;});
  document.getElementById('bdayAlert').innerHTML=h;
}

function renderDash(){
  const rounds=logs.filter(l=>l.type==='sparring').reduce((s,l)=>s+(l.rounds||0),0);
  const att=logs.filter(l=>l.type==='attendance'&&l.status==='present').length;
  const ach=logs.filter(l=>l.type==='achievement').length;
  document.getElementById('globalMetrics').innerHTML=`
    <div class="metric"><div class="metric-val">${athletes.length}</div><div class="metric-lbl">alumnos</div></div>
    <div class="metric"><div class="metric-val">${rounds}</div><div class="metric-lbl">rounds totales</div></div>
    <div class="metric"><div class="metric-val">${att}</div><div class="metric-lbl">asistencias</div></div>
    <div class="metric"><div class="metric-val">${ach}</div><div class="metric-lbl">logros</div></div>`;
  const recent=[...logs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);
  const c=document.getElementById('recentActivity');
  if(!recent.length){c.innerHTML='<div class="empty">Sin registros aún.</div>';return;}
  c.innerHTML=recent.map(l=>{
    const a=athletes.find(x=>x.id===l.athleteId);
    const an=a?a.name:'Alumno eliminado';
    let badge='';
    if(l.type==='attendance')badge=`<span class="badge ${l.status==='present'?'badge-green':'badge-red'}">${l.status==='present'?'Presente':'Ausente'}</span>`;
    if(l.type==='sparring')badge=`<span class="badge badge-purple">${l.rounds} rounds${l.rival?' — vs '+l.rival:''}</span>`;
    if(l.type==='achievement')badge=`<span class="badge badge-amber">Logro: ${l.desc}</span>`;
    if(l.type==='record')badge=`<span class="badge badge-green">${l.recType}: ${l.recVal}</span>`;
    return`<div class="log-item"><div><div class="log-main">${an}</div><div style="margin-top:4px">${badge}</div></div><div class="log-date">${fd(l.date)}</div></div>`;
  }).join('');
}

function renderAthletes(){
  const g=document.getElementById('athleteGrid');
  if(!athletes.length){g.innerHTML='<div class="empty" style="grid-column:1/-1">No hay alumnos cargados.</div>';return;}
  g.innerHTML=athletes.map(a=>{
    const c=ac(a.colorIdx||0),info=ti(a.tier);
    const rounds=logs.filter(l=>l.athleteId===a.id&&l.type==='sparring').reduce((s,l)=>s+(l.rounds||0),0);
    const att=logs.filter(l=>l.athleteId===a.id&&l.type==='attendance'&&l.status==='present').length;
    return`<div class="athlete-card" onclick="openProfile(${a.id})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div class="avatar avatar-md" style="background:${c.bg};color:${c.c}">${ini(a.name)}</div>
        <span class="tier-badge" style="background:${info.bg};color:${info.color};border-color:${info.border}">${a.tier||'—'}</span>
      </div>
      <div style="font-size:15px;font-weight:600;color:#1a1a1a">${a.name}${bdayToday(a.bday)?' 🎂':''}</div>
      <div style="font-size:12px;color:#888780;margin-top:2px">${a.category||''}</div>
      <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap">
        <span class="badge badge-purple">${rounds} rounds</span>
        <span class="badge badge-green">${att} asist</span>
      </div>
    </div>`;
  }).join('');
}

function populateSel(){
  document.getElementById('logAthlete').innerHTML='<option value="">Seleccionar...</option>'+athletes.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
  document.getElementById('logDate').value=new Date().toISOString().split('T')[0];
}

function toggleLogFields(){
  const t=document.getElementById('logType').value;
  ['Attendance','Sparring','Achievement','Record'].forEach(f=>document.getElementById('logField'+f).style.display=t===f.toLowerCase()?'block':'none');
}

function saveLog(){
  const aId=parseInt(document.getElementById('logAthlete').value);
  const date=document.getElementById('logDate').value;
  const type=document.getElementById('logType').value;
  const msg=document.getElementById('logMsg');
  if(!aId||!date){msg.innerHTML='<div class="alert alert-err">Completá alumno y fecha.</div>';return;}
  const e={id:nLid++,athleteId:aId,date,type};
  if(type==='attendance')e.status=document.getElementById('logAttStatus').value;
  if(type==='sparring'){e.rounds=parseInt(document.getElementById('logRounds').value)||1;e.rival=document.getElementById('logRival').value;e.notes=document.getElementById('logSparNotes').value;}
  if(type==='achievement')e.desc=document.getElementById('logAchDesc').value;
  if(type==='record'){e.recType=document.getElementById('logRecType').value;e.recVal=document.getElementById('logRecVal').value;}
  logs.push(e);save();
  msg.innerHTML='<div class="alert alert-ok">Registro guardado correctamente.</div>';
  setTimeout(()=>msg.innerHTML='',2500);
}

function addAthlete(){
  const name=document.getElementById('newName').value.trim();
  const msg=document.getElementById('addAthleteMsg');
  if(!name){msg.innerHTML='<div class="alert alert-err">El nombre es obligatorio.</div>';return;}
  athletes.push({id:nAid++,name,bday:document.getElementById('newBday').value,weight:parseFloat(document.getElementById('newWeight').value)||null,height:parseFloat(document.getElementById('newHeight').value)||null,category:document.getElementById('newCategory').value,startDate:document.getElementById('newStartDate').value,notes:document.getElementById('newNotes').value,colorIdx:athletes.length%AVCOLS.length,tier:selNewTier});
  save();
  ['newName','newBday','newWeight','newHeight','newCategory','newStartDate','newNotes'].forEach(id=>document.getElementById(id).value='');
  selNewTier='B';document.getElementById('newTierSelect').innerHTML=tierHTML('B','selNewTierFn');
  msg.innerHTML='<div class="alert alert-ok">Alumno agregado correctamente.</div>';
  setTimeout(()=>msg.innerHTML='',2500);
}

function openProfile(id){curProfile=id;nav('profile',null);}

function switchTab(ev,name){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  ev.target.classList.add('active');
}

function renderProfile(){
  const a=athletes.find(x=>x.id===curProfile);if(!a)return;
  const c=ac(a.colorIdx||0),info=ti(a.tier);
  const aLogs=logs.filter(l=>l.athleteId===a.id);
  const sparrings=aLogs.filter(l=>l.type==='sparring');
  const totalRounds=sparrings.reduce((s,l)=>s+(l.rounds||0),0);
  const attendances=aLogs.filter(l=>l.type==='attendance');
  const presents=attendances.filter(l=>l.status==='present');
  const achievements=aLogs.filter(l=>l.type==='achievement');
  const records=aLogs.filter(l=>l.type==='record');
  const age=getAge(a.bday);

  const av=document.getElementById('profileAvatar');
  av.textContent=ini(a.name);av.style.cssText=`width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;background:${c.bg};color:${c.c}`;
  document.getElementById('profileName').textContent=a.name;
  document.getElementById('profileTierBadge').innerHTML=`<span class="tier-badge" style="background:${info.bg};color:${info.color};border-color:${info.border};font-size:13px;padding:4px 12px">${a.tier||'—'}</span>`;
  document.getElementById('profileBdayBadge').innerHTML=bdayToday(a.bday)?`<span class="badge badge-amber">Cumple hoy!</span>`:'';
  document.getElementById('profileMeta').textContent=[a.category,age?age+' años':null,a.bday?'Nac. '+fd(a.bday):null,a.startDate?'Desde '+fd(a.startDate):null].filter(Boolean).join(' · ');
  document.getElementById('profileTierSelect').innerHTML=tierHTML(a.tier,'setProfileTier');

  document.getElementById('profileMetrics').innerHTML=`
    <div class="metric"><div class="metric-val">${totalRounds}</div><div class="metric-lbl">rounds sparring</div></div>
    <div class="metric"><div class="metric-val">${sparrings.length}</div><div class="metric-lbl">sesiones spar</div></div>
    <div class="metric"><div class="metric-val">${presents.length}</div><div class="metric-lbl">asistencias</div></div>
    <div class="metric"><div class="metric-val">${achievements.length}</div><div class="metric-lbl">logros</div></div>`;

  document.getElementById('tab-info').innerHTML=`<div class="card">${[['Peso',a.weight?a.weight+' kg':'-'],['Altura',a.height?a.height+' cm':'-'],['Edad',age?age+' años':'-'],['Fecha de nac.',a.bday?fd(a.bday):'-'],['Disciplina',a.category||'-'],['Inicio',a.startDate?fd(a.startDate):'-'],['Notas',a.notes||'-']].map(([k,v])=>`<div class="rec-row"><span style="color:#888780">${k}</span><span style="font-weight:500;text-align:right;max-width:60%">${v}</span></div>`).join('')}</div>`;

  const maxR=Math.max(...sparrings.map(l=>l.rounds||0),1);
  document.getElementById('tab-sparring').innerHTML=sparrings.length
    ?`<div class="card" style="background:#f5f4f0;border:none"><div style="font-size:13px;color:#888780">Total acumulado</div><div style="font-size:28px;font-weight:700;color:#1a1a1a">${totalRounds} rounds</div><div style="font-size:12px;color:#888780">en ${sparrings.length} sesiones</div></div>`
    +sparrings.sort((a,b)=>b.date.localeCompare(a.date)).map(l=>`<div class="card-sm"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:14px;font-weight:600">${l.rounds} rounds${l.rival?' — vs '+l.rival:''}</span><span class="log-date">${fd(l.date)}</span></div><div class="rounds-bar"><div class="rounds-fill" style="width:${Math.round(l.rounds/maxR*100)}%"></div></div>${l.notes?`<div style="font-size:12px;color:#888780;margin-top:6px">${l.notes}</div>`:''}</div>`).join('')
    :'<div class="empty">Sin sparrings registrados.</div>';

  const last28=[];for(let i=27;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);last28.push(d.toISOString().split('T')[0]);}
  const rate=attendances.length?Math.round(presents.length/attendances.length*100):0;
  document.getElementById('tab-attendance').innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;color:#888780">Últimos 28 días</span><span style="font-size:13px;font-weight:600">${rate}% presencia</span></div><div class="att-grid">${last28.map(d=>{const l=attendances.find(x=>x.date===d);return`<div class="att-dot${l?(l.status==='present'?' present':' absent'):''}" title="${fd(d)}"></div>`;}).join('')}</div></div>`
  +([...attendances].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10).map(l=>`<div class="log-item"><span class="log-main">${l.status==='present'?'Presente':'Ausente'}</span><span class="log-date">${fd(l.date)}</span></div>`).join('')||'<div class="empty">Sin registros.</div>');

  document.getElementById('tab-achievements').innerHTML=achievements.length
    ?achievements.sort((a,b)=>b.date.localeCompare(a.date)).map(l=>`<div class="card-sm" style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:14px;font-weight:500">${l.desc}</span><span class="log-date">${fd(l.date)}</span></div>`).join('')
    :'<div class="empty">Sin logros cargados.</div>';

  if(records.length){
    const byEx={};records.forEach(l=>{if(!byEx[l.recType])byEx[l.recType]=[];byEx[l.recType].push(l);});
    document.getElementById('tab-records').innerHTML=Object.entries(byEx).map(([ex,recs])=>{
      const sorted=recs.sort((a,b)=>b.date.localeCompare(a.date));
      return`<div class="card"><div style="font-size:15px;font-weight:600;margin-bottom:8px">${ex}</div>${sorted.map((r,i)=>`<div class="rec-row"><span style="${i===0?'color:#1a1a1a;font-weight:500':'color:#888780'}">${i===0?'Mejor marca':fd(r.date)}</span><span style="${i===0?'color:#085041;font-weight:700':'color:#888780'}">${r.recVal}${i===0?' ✓':''}</span></div>`).join('')}</div>`;
    }).join('');
  }else{document.getElementById('tab-records').innerHTML='<div class="empty">Sin récords registrados.</div>';}
}

checkBdays();
renderDash();
</script>
</body>
</html>
